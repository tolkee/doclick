name: ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Biome + tsc
        run: bun run check

  backend:
    # Windows runner avoids cross-compilation friction for Win32 FFI crates.
    # rust-toolchain.toml at the repo root pins the channel + targets.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: cargo fmt --check
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

  audit:
    # Direct `cargo audit` instead of rustsec/audit-check@v2:
    #   1. The action needs `checks: write` to post check runs and isn't
    #      reachable from PR events with the default token.
    #   2. The action fails on advisory *warnings* (unmaintained / unsound),
    #      which fires for transitive deps we don't control. We want to
    #      block only on real vulnerabilities; unmaintained crates are
    #      surfaced in the log without failing the build.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: cargo audit
        working-directory: src-tauri
        run: cargo audit
