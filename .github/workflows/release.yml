name: release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-windows:
    needs: release-please
    # release-please pushed the tag and (with skip-github-release) did NOT
    # create a GitHub Release. Use tag_name as the trigger: non-empty when
    # release-please bumped + tagged, empty on every other push to main.
    if: ${{ needs.release-please.outputs.tag_name != '' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Build and create release
        # tauri-action is the sole creator of the GitHub Release. Builds
        # the NSIS installer, then creates a published release at the
        # tag release-please pushed, with the .exe attached. The release
        # appears once, with the installer already there.
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ needs.release-please.outputs.tag_name }}
          releaseName: "Doclick ${{ needs.release-please.outputs.tag_name }}"
          releaseDraft: false
          tauriScript: bun run tauri
