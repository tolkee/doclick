name: release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-windows:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Build NSIS installer
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bun run tauri build

      - name: Generate latest.json
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          INSTALLER=$(ls src-tauri/target/release/bundle/nsis/*-setup.exe | head -n1)
          INSTALLER_NAME=$(basename "$INSTALLER")
          SIG=$(cat "${INSTALLER}.sig")
          VERSION="${TAG#v}"
          NOTES=$(gh release view "$TAG" --json body -q .body | head -c 4000)
          PUBDATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          URL="https://github.com/${REPO}/releases/download/${TAG}/${INSTALLER_NAME}"
          jq -n \
            --arg version "$VERSION" \
            --arg notes   "$NOTES" \
            --arg pubdate "$PUBDATE" \
            --arg url     "$URL" \
            --arg sig     "$SIG" \
            '{version:$version, notes:$notes, pub_date:$pubdate,
              platforms:{"windows-x86_64":{signature:$sig, url:$url}}}' \
            > latest.json

      - name: Attach installer + latest.json to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "${{ needs.release-please.outputs.tag_name }}" \
            src-tauri/target/release/bundle/nsis/*-setup.exe latest.json --clobber
